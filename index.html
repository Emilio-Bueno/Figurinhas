<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Collector Max</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body">

    <header>
        <h1>Sticker Collector Max ✨</h1>
        <h2 id="main-subtitle">Meu álbum de 2026</h2>
    </header>

    <div id="dashboard-container">
        <div class="dashboard-card">
            <div class="dashboard-stats">
                <div class="stat-item">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">no álbum</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-missing">994</span>
                    <span class="stat-label">faltando</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-repeated">0</span>
                    <span class="stat-label">repetidas</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modo-selector">
        <button id="btn-modo-album" class="btn-modo active" onclick="mudarModo('album')">Meu Álbum</button>
        <button id="btn-modo-repetidas" class="btn-modo" onclick="mudarModo('repetidas')">Repetidas</button>
        <button class="btn-modo btn-relatorio" onclick="gerarRelatorio()">Relatório</button>
    </div>

    <div class="modo-selector" style="margin-top: 5px;">
        <button class="btn-modo" style="background-color: #f57c00; color: white; border-color: #e65100;" onclick="exportarArquivoBackup()">Criar Backup</button>
        <button class="btn-modo" style="background-color: #1976d2; color: white; border-color: #0d47a1;" onclick="document.getElementById('file-input').click()">Importar Backup</button>
        <input type="file" id="file-input" style="display: none;" accept=".txt, .json, text/plain" onchange="importarArquivoBackup(event)">
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="🔍 Buscar seleção (ex: Brasil)..." autocomplete="off">
        <div id="search-suggestions"></div>
    </div>

    <div id="groups-view"></div>

    <div id="sticker-view">
        <div class="view-header">
            <div class="back-button" onclick="voltar()">←</div>
            <span class="view-title" id="sticker-view-title"></span>
            <div class="next-button" id="btn-next" onclick="proximaSelecao()">→</div>
        </div>

        <div id="sticker-filters" class="modo-selector" style="margin-bottom: 15px; max-width: 500px; padding: 0;">
            <button id="btn-filtro-todas" class="btn-modo active" onclick="aplicarFiltro('todas')">Todas</button>
            <button id="btn-filtro-faltantes" class="btn-modo" onclick="aplicarFiltro('faltantes')">Faltantes</button>
            <button id="btn-filtro-repetidas" class="btn-modo" onclick="aplicarFiltro('repetidas')">Repetidas</button>
        </div>

        <div id="sticker-grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
